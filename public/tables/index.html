<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>数据表浏览</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    .nav-bar { background: #4a90d9; padding: 0 20px; margin-bottom: 32px; }
    .nav-bar .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; }
    .nav-bar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 14px 20px; font-size: 14px; }
    .nav-bar a:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .nav-bar a.active { color: #fff; background: rgba(255,255,255,0.15); font-weight: 600; }
    .container { max-width: 600px; margin: 0 auto; }
    h1 { font-size: 22px; color: #333; margin-bottom: 24px; }
    .tables { display: flex; flex-direction: column; gap: 12px; }
    .tables a {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px; background: #fff; border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1); text-decoration: none; color: #333;
      font-size: 16px; font-weight: 500;
    }
    .tables a:hover { background: #f0f6ff; border-left: 4px solid #4a90d9; }
    .tables a .badge { font-size: 13px; color: #999; font-weight: 400; }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/">导入词汇</a>
      <a href="/tables/" class="active">数据浏览</a>
    </div>
  </nav>
  <div class="container">
    <h1>数据表浏览</h1>
    <div class="tables">
      <a href="/tables/courses.html">课程 (courses) <span class="badge">&rarr;</span></a>
      <a href="/tables/sessions.html">课堂记录 (class_sessions) <span class="badge">&rarr;</span></a>
      <a href="/tables/vocabulary.html">词汇条目 (vocabulary_items) <span class="badge">&rarr;</span></a>
      <a href="/tables/occurrences.html">出现记录 (item_occurrences) <span class="badge">&rarr;</span></a>
      <a href="/tables/reviewlogs.html">复习日志 (review_logs) <span class="badge">&rarr;</span></a>
    </div>
  </div>
</body>
</html>
