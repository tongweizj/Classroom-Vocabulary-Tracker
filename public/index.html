<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>课堂词汇导入</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
    .nav-bar { background: #4a90d9; padding: 0 20px; margin-bottom: 32px; }
    .nav-bar .nav-inner { max-width: 1200px; margin: 0 auto; display: flex; }
    .nav-bar a { color: rgba(255,255,255,0.8); text-decoration: none; padding: 14px 20px; font-size: 14px; }
    .nav-bar a:hover { color: #fff; background: rgba(255,255,255,0.1); }
    .nav-bar a.active { color: #fff; background: rgba(255,255,255,0.15); font-weight: 600; }
    .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 32px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    h1 { font-size: 20px; margin-bottom: 24px; color: #333; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 14px; font-weight: 500; color: #555; margin-bottom: 4px; }
    label .required { color: #e74c3c; }
    input, textarea { width: 100%; padding: 8px 12px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
    input:focus, textarea:focus { outline: none; border-color: #4a90d9; box-shadow: 0 0 0 2px rgba(74,144,217,0.2); }
    textarea { resize: vertical; min-height: 60px; }
    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }
    input[type="file"] { padding: 6px; }
    button { width: 100%; padding: 10px; background: #4a90d9; color: #fff; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
    button:hover { background: #3a7bc8; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    .result { margin-top: 20px; padding: 12px; border-radius: 4px; display: none; }
    .result.success { display: block; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
    .result.error { display: block; background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
    .result pre { font-size: 13px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <nav class="nav-bar">
    <div class="nav-inner">
      <a href="/" class="active">导入词汇</a>
      <a href="/tables/">数据浏览</a>
    </div>
  </nav>
  <div class="container">
    <h1>课堂词汇导入</h1>
    <form id="importForm">
      <div class="form-group">
        <label for="file">Excel 文件 <span class="required">*</span></label>
        <input type="file" id="file" name="file" accept=".xlsx,.xls" required>
      </div>
      <div class="row">
        <div class="form-group">
          <label for="courseCode">课程代码 <span class="required">*</span></label>
          <input type="text" id="courseCode" name="courseCode" placeholder="如 EN101" required>
        </div>
        <div class="form-group">
          <label for="sessionDate">上课日期 <span class="required">*</span></label>
          <input type="date" id="sessionDate" name="sessionDate" required>
        </div>
      </div>
      <div class="row">
        <div class="form-group">
          <label for="courseName">课程名称</label>
          <input type="text" id="courseName" name="courseName" placeholder="如 大学英语">
        </div>
        <div class="form-group">
          <label for="teacherName">教师姓名</label>
          <input type="text" id="teacherName" name="teacherName" placeholder="如 张老师">
        </div>
      </div>
      <div class="form-group">
        <label for="semester">学期</label>
        <input type="text" id="semester" name="semester" placeholder="如 2025-2026-1">
      </div>
      <div class="form-group">
        <label for="topic">课堂主题</label>
        <input type="text" id="topic" name="topic" placeholder="如 Unit 1 Greetings">
      </div>
      <div class="row">
        <div class="form-group">
          <label for="rawTranscriptPath">原始转录路径</label>
          <input type="text" id="rawTranscriptPath" name="rawTranscriptPath">
        </div>
        <div class="form-group">
          <label for="cleanedTranscriptPath">清洗后转录路径</label>
          <input type="text" id="cleanedTranscriptPath" name="cleanedTranscriptPath">
        </div>
      </div>
      <div class="form-group">
        <label for="summary">课堂摘要</label>
        <textarea id="summary" name="summary" placeholder="可填写课堂内容摘要"></textarea>
      </div>
      <button type="submit" id="submitBtn">提交导入</button>
    </form>
    <div id="result" class="result"></div>
  </div>

  <script>
    const form = document.getElementById("importForm");
    const resultEl = document.getElementById("result");
    const submitBtn = document.getElementById("submitBtn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const formData = new FormData(form);

      submitBtn.disabled = true;
      submitBtn.textContent = "导入中...";
      resultEl.className = "result";

      try {
        const res = await fetch("/api/import/vocabulary", {
          method: "POST",
          body: formData
        });
        const data = await res.json();

        if (res.ok) {
          resultEl.className = "result success";
          resultEl.innerHTML = `<strong>导入成功</strong><pre>${JSON.stringify(data, null, 2)}</pre>`;
        } else {
          resultEl.className = "result error";
          resultEl.innerHTML = `<strong>导入失败</strong><pre>${JSON.stringify(data, null, 2)}</pre>`;
        }
      } catch (err) {
        resultEl.className = "result error";
        resultEl.innerHTML = `<strong>请求出错</strong><pre>${err.message}</pre>`;
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "提交导入";
      }
    });
  </script>
</body>
</html>
